# Local development stack for app-census.
#
#   proxy     — Caddy: single entry point (http://localhost:8080) routing
#               /api → ingest API, /ingest → ingest form, / → dashboard
#   db        — Postgres (the store; source of truth)
#   ingest    — FastAPI write side (parse → preview → confirm → commit)
#   dashboard — Streamlit read side (analytics)
#
# Only the proxy (and db, for host-run reference-data importers) publish ports;
# ingest + dashboard are reached through the proxy on the internal network — one
# origin, mirroring how prod sits behind Pangolin. All binds are 127.0.0.1 only.
services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - ingest
      - dashboard

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: census
      POSTGRES_PASSWORD: census
      POSTGRES_DB: census
    ports:
      # Published so host-run reference-data importers (scripts/) can reach it.
      - "127.0.0.1:5432:5432"
    volumes:
      - census-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census -d census"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://census:census@db:5432/census
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://census:census@db:5432/census
    expose:
      - "8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  census-db:
